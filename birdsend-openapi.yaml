          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          type: integer
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Personal Access Token or OAuth Access Token
  schemas:
    Error:
      type: object
      additionalProperties: true
      description: BirdSend error response.
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          oneOf:
          - type: string
          - type: integer
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
        to:
          type: integer
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        total:
          type: integer
    Account:
      type: object
      properties:
        account_id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        timezone:
          type: string
        avatar_url:
          type: string
        joined_at:
          type: string
        last_seen_at:
          type: string
          nullable: true
    Sender:
      type: object
      required:
      - email
      - name
      - address
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        company:
          type: string
        address:
          type: string
    Stats:
      type: object
      properties:
        sent:
          type: number
        opens:
          type: number
        clicks:
          type: number
        altv:
          type: number
        bounces:
          type: number
        spams:
          type: number
        unsubscribes:
          type: number
    BroadcastCondition:
      type: object
      required:
      - type
      - operator
      - value
      properties:
        type:
          type: string
          enum:
          - tag
          - sequence
          - segment
        operator:
          type: string
          enum:
          - equal
          - not_equal
        value:
          oneOf:
          - type: string
          - type: integer
    BroadcastRecipient:
      type: object
      properties:
        match:
          type: string
          enum:
          - any
          - all
          - exclude
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/BroadcastCondition'
    BroadcastEmail:
      type: object
      required:
      - subject
      - body
      properties:
        subject:
          type: string
        body:
          type: string
    BroadcastSchedule:
      type: object
      required:
      - type
      properties:
        type:
          type: string
        datetime:
          type: string
        timezone:
          type: string
    BroadcastRequest:
      type: object
      required:
      - name
      - email
      - schedule
      properties:
        name:
          type: string
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/BroadcastRecipient'
        email:
          $ref: '#/components/schemas/BroadcastEmail'
        sender:
          $ref: '#/components/schemas/Sender'
        footer:
          type: string
        schedule:
          $ref: '#/components/schemas/BroadcastSchedule'
    Broadcast:
      allOf:
      - $ref: '#/components/schemas/BroadcastRequest'
      - type: object
        properties:
          broadcast_id:
            type: integer
          stats:
            $ref: '#/components/schemas/Stats'
          sent_at:
            type: string
            nullable: true
          created_at:
            type: string
    ContactFields:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
      additionalProperties:
        type: string
    ContactTag:
      type: object
      properties:
        tag_id:
          type: integer
        name:
          type: string
        tagged_at:
          type: string
    ContactSequence:
      type: object
      properties:
        sequence_id:
          type: integer
        current_step:
          type: number
        name:
          type: string
        description:
          type: string
        subscribed_at:
          type: string
        confirmed_at:
          type: string
    Contact:
      type: object
      properties:
        contact_id:
          type: integer
        email:
          type: string
          format: email
        fields:
          $ref: '#/components/schemas/ContactFields'
        ipaddress:
          type: string
          format: ipv4
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ContactTag'
        sequences:
          type: array
          items:
            $ref: '#/components/schemas/ContactSequence'
        subscribed_at:
          type: string
        confirmed_at:
          type: string
    ContactCreate:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        fields:
          $ref: '#/components/schemas/ContactFields'
        form_id:
          type: integer
        sequence_id:
          type: integer
        tags:
          type: array
          items:
            type: string
        ipaddress:
          type: string
          format: ipv4
    ContactUpdate:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        fields:
          $ref: '#/components/schemas/ContactFields'
        ipaddress:
          type: string
          format: ipv4
    Conversion:
      type: object
      required:
      - name
      properties:
        conversion_id:
          type: integer
        name:
          type: string
        value:
          type: number
        currency:
          type: string
        url:
          type: string
          format: uri
        created_at:
          type: string
        updated_at:
          type: string
    ConversionRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        value:
          type: number
        currency:
          type: string
        url:
          type: string
          format: uri
    CustomField:
      type: object
      properties:
        field_id:
          type: integer
        label:
          type: string
        type:
          type: string
          enum:
          - text
          - textarea
        key:
          type: string
        default:
          type: string
    CustomFieldRequest:
      type: object
      required:
      - label
      - type
      - key
      properties:
        label:
          type: string
        type:
          type: string
          enum:
          - text
          - textarea
        key:
          type: string
        default:
          type: string
    Form:
      type: object
      properties:
        form_id:
          type: integer
        name:
          type: string
    RuleStep:
      type: object
      properties:
        trigger:
          type: string
        action:
          type: string
        params:
          type: object
          additionalProperties: true
    Rule:
      type: object
      properties:
        rule_id:
          type: integer
        name:
          type: string
        active:
          type: boolean
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/RuleStep'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/RuleStep'
        created_at:
          type: string
        last_run_at:
          type: string
          nullable: true
    RuleRequest:
      type: object
      required:
      - name
      - active
      properties:
        name:
          type: string
        active:
          type: boolean
        triggers:
          type: array
          items:
            type: object
            required:
            - trigger
            - params
            properties:
              trigger:
                type: string
                enum:
                - tag_applied
                - tag_removed
                - email_opened
                - link_clicked
                - subscribed
                - unsubscribed
                - sequence_completed
                - has_conversion
                - has_conversion_value
              params:
                type: object
                additionalProperties: true
        actions:
          type: array
          items:
            type: object
            required:
            - action
            - params
            properties:
              action:
                type: string
                enum:
                - apply_tag
                - remove_tag
                - subscribe
                - unsubscribe
                - move_sequence
                - add_conversion
                - delete
              params:
                type: object
                additionalProperties: true
    Sequence:
      type: object
      properties:
        sequence_id:
          type: integer
        name:
          type: string
        description:
          type: string
        sender:
          $ref: '#/components/schemas/Sender'
        footer:
          type: string
        notification:
          type: string
        active:
          oneOf:
          - type: boolean
          - type: string
        created_at:
          type: string
    SequenceRequest:
      type: object
      required:
      - name
      - sender
      properties:
        name:
          type: string
        description:
          type: string
        sender:
          $ref: '#/components/schemas/Sender'
        footer:
          type: string
        notification:
          type: string
        active:
          type: boolean
    SequenceEmailSchedule:
      type: object
      required:
      - delay
      - type
      properties:
        delay:
          type: number
        type:
          type: string
    SequenceEmail:
      type: object
      properties:
        email_id:
          type: integer
        sequence_id:
          type: integer
        subject:
          type: string
        body:
          type: string
        schedule:
          $ref: '#/components/schemas/SequenceEmailSchedule'
        active:
          type: boolean
        stats:
          $ref: '#/components/schemas/Stats'
        order:
          type: number
    SequenceEmailRequest:
      type: object
      required:
      - subject
      - body
      properties:
        subject:
          type: string
        body:
          type: string
        schedule:
          $ref: '#/components/schemas/SequenceEmailSchedule'
        active:
          type: boolean
    Tag:
      type: object
      properties:
        tag_id:
          type: integer
        name:
          type: string
    TagRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
