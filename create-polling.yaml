openapi: 3.0.0

info:
  title: Create Schedule Poll
  version: 1.3.0
  description: Spesifikasi untuk membuat polling pada sebuah jadwal rapat Rapatin.

servers:
  - url: https://api.rapatin.id

tags:
  - name: Create Schedule Poll

paths:
  /schedules/{meeting_id}/polls:
    post:
      tags:
        - Create Schedule Poll
      summary: Membuat polling pada jadwal
      description: |-
        Membuat polling baru pada sebuah jadwal meeting Zoom berdasarkan `meeting_id`.

        Satu polling dapat memiliki satu atau lebih pertanyaan.

        **Jenis pertanyaan yang tersedia:**
        - `single` — peserta hanya dapat memilih satu jawaban.
        - `multiple` — peserta dapat memilih lebih dari satu jawaban.

        **Ketentuan:**
        - `title` wajib diisi.
        - Minimal terdapat satu pertanyaan.
        - Setiap pertanyaan wajib memiliki minimal dua jawaban.
        - Jika `required = true`, peserta wajib menjawab pertanyaan tersebut.
        - Jadwal harus dimiliki oleh pengguna yang sedang terautentikasi.
        - Polling hanya dapat dibuat pada jadwal yang masih tersedia dan belum dihapus.

      parameters:
        - in: path
          name: meeting_id
          required: true
          description: Zoom Meeting ID dari jadwal yang akan diberi polling.
          schema:
            type: string
            maxLength: 255
            example: "84887441426"

        - in: header
          name: Content-Type
          required: true
          description: Format data yang dikirim.
          schema:
            type: string
            enum:
              - application/json
            example: application/json

        - in: header
          name: Authorization
          required: true
          description: Token autentikasi dalam format Bearer.
          schema:
            type: string
            example: "Bearer {{token}}"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchedulePollRequest"
            examples:
              singleQuestion:
                summary: Polling dengan satu pertanyaan
                value:
                  title: "Evaluasi Materi Webinar"
                  questions:
                    - type: "single"
                      question: "Seberapa mudah materi webinar ini dipahami?"
                      answers:
                        - text: "Sangat mudah"
                        - text: "Mudah"
                        - text: "Cukup sulit"
                        - text: "Sangat sulit"
                      required: true

              multipleQuestions:
                summary: Polling dengan beberapa pertanyaan
                value:
                  title: "Evaluasi Sesi Pelatihan"
                  questions:
                    - type: "single"
                      question: "Bagaimana penilaian Anda terhadap pemateri?"
                      answers:
                        - text: "Sangat baik"
                        - text: "Baik"
                        - text: "Cukup"
                        - text: "Kurang"
                      required: true

                    - type: "multiple"
                      question: "Bagian mana yang paling bermanfaat?"
                      answers:
                        - text: "Pemaparan materi"
                        - text: "Studi kasus"
                        - text: "Diskusi"
                        - text: "Sesi tanya jawab"
                      required: false

      responses:
        "201":
          description: Poll created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSchedulePollSuccessResponse"
              example:
                response:
                  status: success
                  status_code: 201
                  message: Poll created successfully
                data:
                  id: 117
                  meeting_id: "84887441426"
                  title: "Evaluasi Sesi Pelatihan"
                  questions:
                    - type: "single"
                      question: "Bagaimana penilaian Anda terhadap pemateri?"
                      answers:
                        - text: "Sangat baik"
                        - text: "Baik"
                        - text: "Cukup"
                        - text: "Kurang"
                      required: true

                    - type: "multiple"
                      question: "Bagian mana yang paling bermanfaat?"
                      answers:
                        - text: "Pemaparan materi"
                        - text: "Studi kasus"
                        - text: "Diskusi"
                        - text: "Sesi tanya jawab"
                      required: false
                  created_at: "2026-07-13T06:38:24.000000Z"
                  updated_at: "2026-07-13T06:38:25.000000Z"

        "400":
          description: Permintaan tidak dapat diproses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response:
                  status: error
                  status_code: 400
                  message: Unable to create poll

        "401":
          description: Token tidak tersedia atau tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response:
                  status: error
                  status_code: 401
                  message: Unauthenticated

        "403":
          description: Pengguna tidak memiliki akses ke jadwal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response:
                  status: error
                  status_code: 403
                  message: You are not authorized to create a poll for this schedule

        "404":
          description: Jadwal tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response:
                  status: error
                  status_code: 404
                  message: Schedule not found

        "409":
          description: Polling telah tersedia pada jadwal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                response:
                  status: error
                  status_code: 409
                  message: Poll already exists for this schedule

        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                titleRequired:
                  summary: Judul polling tidak tersedia
                  value:
                    response:
                      status: error
                      status_code: 422
                      message: Validation error
                    errors:
                      title:
                        - "The title field is required."

                emptyQuestions:
                  summary: Pertanyaan tidak tersedia
                  value:
                    response:
                      status: error
                      status_code: 422
                      message: Validation error
                    errors:
                      questions:
                        - "The questions field must contain at least 1 item."

                invalidQuestionType:
                  summary: Jenis pertanyaan tidak valid
                  value:
                    response:
                      status: error
                      status_code: 422
                      message: Validation error
                    errors:
                      questions.0.type:
                        - "The selected questions.0.type is invalid."

                questionRequired:
                  summary: Teks pertanyaan tidak tersedia
                  value:
                    response:
                      status: error
                      status_code: 422
                      message: Validation error
                    errors:
                      questions.0.question:
                        - "The questions.0.question field is required."

                insufficientAnswers:
                  summary: Jawaban kurang dari dua
                  value:
                    response:
                      status: error
                      status_code: 422
                      message: Validation error
                    errors:
                      questions.0.answers:
                        - "The questions.0.answers field must contain at least 2 items."

components:
  schemas:
    CreateSchedulePollRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - questions
      properties:
        title:
          type: string
          maxLength: 255
          description: Judul polling.
          example: "Evaluasi Sesi Pelatihan"

        questions:
          type: array
          minItems: 1
          description: Daftar pertanyaan dalam polling.
          items:
            $ref: "#/components/schemas/PollQuestion"

    PollQuestion:
      type: object
      additionalProperties: false
      required:
        - type
        - question
        - answers
        - required
      properties:
        type:
          type: string
          enum:
            - single
            - multiple
          description: Jenis pertanyaan. `single` untuk satu jawaban dan `multiple` untuk lebih dari satu jawaban.
          example: "single"

        question:
          type: string
          maxLength: 500
          description: Teks pertanyaan polling.
          example: "Bagaimana penilaian Anda terhadap pemateri?"

        answers:
          type: array
          minItems: 2
          description: Daftar pilihan jawaban.
          items:
            $ref: "#/components/schemas/PollAnswer"

        required:
          type: boolean
          default: false
          description: Menentukan apakah pertanyaan wajib dijawab.
          example: true

    PollAnswer:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
          maxLength: 255
          description: Teks pilihan jawaban.
          example: "Sangat baik"

    CreateSchedulePollSuccessResponse:
      type: object
      required:
        - response
        - data
      properties:
        response:
          $ref: "#/components/schemas/SuccessResponse201"
        data:
          $ref: "#/components/schemas/MeetingPoll"

    MeetingPoll:
      type: object
      required:
        - id
        - meeting_id
        - title
        - questions
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: ID polling.
          example: 117

        meeting_id:
          type: string
          maxLength: 255
          description: Zoom Meeting ID.
          example: "84887441426"

        title:
          type: string
          maxLength: 255
          description: Judul polling.
          example: "Evaluasi Sesi Pelatihan"

        questions:
          type: array
          description: Daftar pertanyaan polling.
          items:
            $ref: "#/components/schemas/PollQuestion"

        created_at:
          type: string
          format: date-time
          description: Waktu polling dibuat.
          example: "2026-07-13T06:38:24.000000Z"

        updated_at:
          type: string
          format: date-time
          description: Waktu polling terakhir diperbarui.
          example: "2026-07-13T06:38:25.000000Z"

    SuccessResponse201:
      type: object
      required:
        - status
        - status_code
        - message
      properties:
        status:
          type: string
          enum:
            - success
          example: success

        status_code:
          type: integer
          enum:
            - 201
          example: 201

        message:
          type: string
          example: Poll created successfully

    ErrorResponse:
      type: object
      required:
        - response
      properties:
        response:
          type: object
          required:
            - status
            - status_code
            - message
          properties:
            status:
              type: string
              enum:
                - error
              example: error

            status_code:
              type: integer
              example: 404

            message:
              type: string
              example: Schedule not found

    ValidationErrorResponse:
      type: object
      required:
        - response
        - errors
      properties:
        response:
          type: object
          required:
            - status
            - status_code
            - message
          properties:
            status:
              type: string
              enum:
                - error
              example: error

            status_code:
              type: integer
              enum:
                - 422
              example: 422

            message:
              type: string
              example: Validation error

        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
