openapi: 3.0.0
info:
  title: Update Schedule Poll
  version: 2.0.0
  description: Spesifikasi untuk memperbarui polling pada sebuah jadwal rapat Rapatin.
servers:
- url: https://api.rapatin.id
tags:
- name: Polling
paths:
  /schedules/{meeting_id}/polls/{poll_id}:
    put:
      tags:
      - Polling
      summary: Memperbarui polling pada jadwal
      description: Memperbarui polling pada sebuah jadwal meeting berdasarkan `meeting_id` dan `poll_id`.
      parameters:
      - in: path
        name: meeting_id
        required: true
        description: Zoom Meeting ID dari jadwal.
        schema:
          type: string
          example: '84887441426'
      - in: path
        name: poll_id
        required: true
        description: ID polling yang akan diperbarui.
        schema:
          type: string
          example: 57kj4tqOQ9CKxmeetFtECg
      - in: header
        name: Content-Type
        required: true
        schema:
          type: string
          example: application/json
      - in: header
        name: Authorization
        required: true
        schema:
          type: string
          example: Bearer {{token}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchedulePollRequest'
            example:
              title: Evaluasi Sesi Webinar
              questions:
              - type: single
                question: Bagaimana penilaian Anda terhadap materi webinar?
                answers:
                - text: Sangat baik
                - text: Baik
                - text: Cukup
                - text: Kurang
                required: true
      responses:
        '200':
          description: Poll updated successfully
          content:
            application/json:
              example:
                response:
                  status: success
                  status_code: 200
                  message: Poll updated successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Poll not found
        '422':
          description: Validation error
          content:
            application/json:
              example:
                response:
                  status: error
                  status_code: 422
                  message: Validation error
                errors:
                  title:
                  - The title field is required.
components:
  schemas:
    UpdateSchedulePollRequest:
      type: object
      required:
      - title
      - questions
      properties:
        title:
          type: string
          description: Judul polling.
        questions:
          type: array
          description: Daftar pertanyaan dalam polling.
          items:
            $ref: '#/components/schemas/PollQuestion'
    PollQuestion:
      type: object
      required:
      - type
      - question
      - answers
      - required
      properties:
        type:
          type: string
          enum:
          - single
          - multiple
        question:
          type: string
        answers:
          type: array
          items:
            $ref: '#/components/schemas/PollAnswer'
        required:
          type: boolean
    PollAnswer:
      type: object
      required:
      - text
      properties:
        text:
          type: string
