openapi: 3.0.0
info:
  title: List Order Balance
  version: 1.0.0
  description: Endpoint untuk mengambil daftar order balance milik user.

servers:
  - url: https://api.rapatin.id

paths:
  /balances/orders:
    get:
      tags: [List Order Balance]
      summary: List Order Balance
      description: Ambil daftar order balance milik user yang sedang login.
      parameters:
        - in: header
          name: Accept
          required: true
          schema:
            type: string
            example: application/json
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer {token}"
      responses:
        '200':
          description: Order balance retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBalanceListSuccessResponse"
              example:
                response:
                  status: success
                  status_code: 200
                  message: Order balance retrieved successfully
                data:
                  items:
                    - order_number: "OR-3349"
                      balance: 200000
                      payment_method: "virtual_account"
                      promo_code: "PROMOHEMAT"
                      discount_amount: 10000
                      payment_fee: 4440
                      total_amount: 194440
                      status: "pending"
                      created_at: "2025-10-12 14:00:00"
                      updated_at: "2025-10-12 14:00:00"
                    - order_number: "OR-3348"
                      balance: 500000
                      payment_method: "qris"
                      promo_code: null
                      discount_amount: 0
                      payment_fee: 3500
                      total_amount: 503500
                      status: "paid"
                      created_at: "2025-10-11 09:15:00"
                      updated_at: "2025-10-11 09:18:20"
                    - order_number: "OR-3347"
                      balance: 100000
                      payment_method: "dana"
                      promo_code: null
                      discount_amount: 0
                      payment_fee: 2500
                      total_amount: 102500
                      status: "cancelled"
                      created_at: "2025-10-10 20:00:00"
                      updated_at: "2025-10-10 20:10:30"
                  meta:
                    current_page: 1
                    per_page: 15
                    total: 3
                    last_page: 1
        '401':
          description: Unauthorized (token tidak valid)

components:
  schemas:
    OrderBalanceListSuccessResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            status:
              type: string
              example: success
            status_code:
              type: integer
              example: 200
            message:
              type: string
              example: Order balance retrieved successfully
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderBalanceListItem"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    OrderBalanceListItem:
      type: object
      properties:
        order_number:
          type: string
          description: Nomor order balance.
          example: OR-3349
        balance:
          type: integer
          description: Nominal balance yang dibeli.
          example: 200000
        payment_method:
          type: string
          description: Metode pembayaran yang dipilih.
          example: virtual_account
        promo_code:
          type: string
          nullable: true
          description: Promo code yang digunakan, jika ada.
          example: PROMOHEMAT
        discount_amount:
          type: integer
          description: Nominal potongan promo.
          example: 10000
        payment_fee:
          type: integer
          description: Biaya pembayaran.
          example: 4440
        total_amount:
          type: integer
          description: Total akhir yang harus dibayar.
          example: 194440
        status:
          type: string
          enum: [pending, paid, cancelled, expired]
          description: Status order balance.
          example: pending
        created_at:
          type: string
          description: "YYYY-MM-DD HH:mm:ss"
          example: "2025-10-12 14:00:00"
        updated_at:
          type: string
          description: "YYYY-MM-DD HH:mm:ss"
          example: "2025-10-12 14:00:00"

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 3
        last_page:
          type: integer
          example: 1
