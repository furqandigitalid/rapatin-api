openapi: 3.0.0
info:
  title: Show Balance Account
  version: 1.0.0
  description: Endpoint untuk mengambil informasi akun dan rincian saldo customer.

servers:
  - url: https://api.rapatin.id

paths:
  /balances/account:
    get:
      tags: [Show Balance]
      summary: Show Balance Account
      description: Ambil informasi akun customer beserta rincian saldo yang dimiliki.
      parameters:
        - in: header
          name: Accept
          required: true
          schema:
            type: string
            example: application/json
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer {token}"
      responses:
        '200':
          description: Balance account retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceAccountSuccessResponse"
              example:
                response:
                  status: success
                  status_code: 200
                  message: Balance account retrieved successfully
                data:
                  account:
                    id: 125
                    name: "Mohamad Abdul Hofir"
                    email: "abihofir75@gmail.com"
                    phone: "81802855106"
                    company: null
                    address: null
                    role: "CUSTOMER"
                    created_at: "2026-03-06 10:12:00"
                    updated_at: "2026-03-07 09:45:10"
                  balance:
                    all_balance: 0
                    referral_balance: 0
                    own_balance: 0
                    promo_balance: 0
        '401':
          description: Unauthorized (token tidak valid)

components:
  schemas:
    BalanceAccountSuccessResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            status:
              type: string
              example: success
            status_code:
              type: integer
              example: 200
            message:
              type: string
              example: Balance account retrieved successfully
        data:
          type: object
          properties:
            account:
              type: object
              properties:
                id:
                  type: integer
                  description: ID akun customer.
                  example: 125
                name:
                  type: string
                  description: Nama customer.
                  example: Mohamad Abdul Hofir
                email:
                  type: string
                  description: Email customer.
                  example: abihofir75@gmail.com
                phone:
                  type: string
                  description: Nomor telepon customer.
                  example: "81802855106"
                company:
                  type: string
                  nullable: true
                  description: Nama perusahaan customer, jika ada.
                  example: null
                address:
                  type: string
                  nullable: true
                  description: Alamat customer, jika ada.
                  example: null
                role:
                  type: string
                  description: Role akun.
                  example: CUSTOMER
                created_at:
                  type: string
                  description: "Tanggal akun dibuat dalam format YYYY-MM-DD HH:mm:ss"
                  example: "2026-03-06 10:12:00"
                updated_at:
                  type: string
                  description: "Tanggal akun terakhir diperbarui dalam format YYYY-MM-DD HH:mm:ss"
                  example: "2026-03-07 09:45:10"
            balance:
              type: object
              properties:
                all_balance:
                  type: integer
                  description: Total seluruh saldo yang dimiliki akun.
                  example: 0
                referral_balance:
                  type: integer
                  description: Saldo yang berasal dari referral.
                  example: 0
                own_balance:
                  type: integer
                  description: Saldo utama / saldo hasil top up sendiri.
                  example: 0
                promo_balance:
                  type: integer
                  description: Saldo yang berasal dari promo.
                  example: 0
