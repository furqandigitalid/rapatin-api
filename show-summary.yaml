openapi: 3.0.0
info:
  title: Show Summary Details
  version: 1.0.0
  description: Ambil ringkasan rapat (summary) beserta detailnya berdasarkan `meeting_id`.
servers:
  - url: https://api.rapatin.id

paths:
  /summaries/{meeting_id}:
    get:
      tags: [Show Summaries]
      summary: Menampilkan Detail Isi Ringkasan Rapat
      description: |
        Mengembalikan daftar **summary** untuk rapat dengan `meeting_id` tertentu.
        - `meeting_uuid` adalah **ID unik sesi rapat** (occurrence) dari Zoom.
      parameters:
        - in: path
          name: meeting_id
          required: true
          schema:
            type: string
            example: "85432104253"
          description: Meeting ID Zoom.
        - in: header
          name: Accept
          required: true
          schema:
            type: string
            example: application/json
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer {token}"
      responses:
        '200':
          description: Summary fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryShowSuccessResponse"
              example:
                response:
                  status: success
                  status_code: 200
                  message: Summary fetched successfully
                data:
                  - id: 501
                    meeting_topic: "Rapat Koordinasi Program Literasi Digital"
                    meeting_id: "85432104253"
                    meeting_uuid: "odHoRmdwTDenUkYh+lbXuA=="
                    summary_created_time: "2025-09-30 10:22:11"
                    created_at: "2025-09-30 11:05:00"
                    updated_at: "2025-09-30 11:05:00"
                    summary_title: "Ringkasan Rapat Literasi Digital"
                    summary_overview: >
                      Tim membahas rencana kampanye literasi digital Q4, konsolidasi
                      materi pelatihan, serta pembagian peran antar wilayah.
                      Disepakati fokus pada modul keamanan siber pemula dan
                      penguatan kanal komunikasi komunitas.
                    summary_details:
                      - label: "Target & Cakupan"
                        summary: >
                          Program diarahkan untuk siswa SMA/SMK dan perangkat desa
                          di 12 kabupaten. Penetapan KPI: 5.000 peserta tersertifikasi,
                          30 sekolah mitra, dan 60 relawan fasilitator.
                      - label: "Materi & Produksi Konten"
                        summary: >
                          Modul dasar yang dipakai: keamanan akun, privasi data,
                          literasi informasi, dan etika digital. Konten video 3–5 menit
                          diproduksi per topik, dengan subtitle BI & daerah.
                      - label: "Kemitraan & Logistik"
                        summary: >
                          Dinas Kominfo dan komunitas lokal menjadi tuan rumah sesi
                          luring. Pengadaan perangkat pinjam pakai dicadangkan untuk
                          sekolah tanpa lab komputer.
                    next_steps:
                      - "Tim kurikulum memfinalisasi modul versi 1.2 (deadline Jumat)."
                      - "Hubungi 12 sekolah prioritas untuk penjadwalan Oktober."
                      - "Produksi 6 video pendek batch pertama (rilis pekan depan)."
                      - "Susun daftar relawan fasilitator dan sesi pelatihan internal."
        '401':
          description: Unauthorized (token tidak valid)
        '404':
          description: Summary not found

components:
  schemas:
    SummaryShowSuccessResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            status: { type: string, example: success }
            status_code: { type: integer, example: 200 }
            message: { type: string, example: Summary fetched successfully }
        data:
          type: array
          items:
            $ref: "#/components/schemas/SummaryDetailItem"

    SummaryDetailItem:
      type: object
      properties:
        id: { type: integer }
        meeting_topic: { type: string }
        meeting_id: { type: string }
        meeting_uuid:
          type: string
          description: ID unik untuk **sesi rapat** (occurrence) yang dihasilkan oleh Zoom.
        summary_created_time:
          type: string
          description: "YYYY-MM-DD HH:mm:ss"
        created_at:
          type: string
          description: "YYYY-MM-DD HH:mm:ss"
        updated_at:
          type: string
          description: "YYYY-MM-DD HH:mm:ss"
        summary_title: { type: string }
        summary_overview: { type: string }
        summary_details:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              summary: { type: string }
        next_steps:
          type: array
          items: { type: string }
