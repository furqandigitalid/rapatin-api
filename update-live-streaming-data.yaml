openapi: 3.0.0
servers:
- url: https://api.rapatin.id
tags:
- name: Live Streaming
  description: Pengelolaan live streaming pada jadwal rapat.
info:
  title: Update Schedule Live Streaming
  version: 1.0.0
  description: Spesifikasi untuk memperbarui data live streaming pada sebuah jadwal rapat Rapatin.
paths:
  /schedules/{meeting_id}/live-streaming:
    put:
      tags:
      - Update Live Streaming Data
      summary: Memperbarui data live streaming pada jadwal
      description: Memperbarui konfigurasi live streaming pada sebuah jadwal meeting berdasarkan `meeting_id`.
      parameters:
      - in: path
        name: meeting_id
        required: true
        description: Zoom Meeting ID dari jadwal.
        schema:
          type: string
          example: '84887441426'
      - in: header
        name: Content-Type
        required: true
        description: Format data yang dikirim.
        schema:
          type: string
          example: application/json
      - in: header
        name: Authorization
        required: true
        description: Token autentikasi dalam format Bearer.
        schema:
          type: string
          example: Bearer {{token}}
      responses:
        '200':
          description: Live streaming data updated successfully
          content:
            application/json:
              example:
                response:
                  status: success
                  status_code: 200
                  message: Live streaming data updated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                response:
                  status: error
                  status_code: 401
                  message: Unauthenticated
        '403':
          description: Forbidden
          content:
            application/json:
              example:
                response:
                  status: error
                  status_code: 403
                  message: You are not authorized to update this schedule
        '404':
          description: Live streaming data not found
          content:
            application/json:
              example:
                response:
                  status: error
                  status_code: 404
                  message: Live streaming data not found
        '422':
          description: Validation error
          content:
            application/json:
              example:
                response:
                  status: error
                  status_code: 422
                  message: Validation error
                errors:
                  stream_url:
                  - The stream url field is required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiveStreamingRequest'
            example:
              stream_url: rtmp://a.rtmp.youtube.com/live2
              stream_key: abcd-efgh-ijkl-mnop
              live_stream_page_url: https://www.youtube.com/watch?v=abcdefghijk
components:
  schemas:
    LiveStreamingRequest:
      type: object
      additionalProperties: false
      required:
      - stream_url
      - stream_key
      - live_stream_page_url
      properties:
        stream_url:
          type: string
          format: uri
          description: URL server streaming.
          example: rtmp://a.rtmp.youtube.com/live2
        stream_key:
          type: string
          description: Stream key.
          example: abcd-efgh-ijkl-mnop
        live_stream_page_url:
          type: string
          format: uri
          description: URL halaman live streaming.
          example: https://www.youtube.com/watch?v=abcdefghijk
