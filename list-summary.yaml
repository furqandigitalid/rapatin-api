openapi: 3.0.0
info:
  title: Summaries - List
  version: 1.0.0
  description: Endpoint untuk mengambil daftar meeting summaries.

servers:
  - url: https://api.rapatin.id

paths:
  /summaries:
    get:
      tags: [List Summaries]
      summary: Mengambil Daftar Ringkasan Rapat
      description: Daftar ringkasan (meeting summaries) akan tersedia jika fitur Meeting Summary saat rapat berlangsung diaktifkan.
      parameters:
        - in: header
          name: Accept
          required: true
          schema:
            type: string
            example: application/json
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer {token}"
      responses:
        '200':
          description: Summary retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummariesListResponse"
              example:
                response:
                  status: success
                  status_code: 200
                  message: Summary retrieved successfully
                data:
                  items:
                    - id: 144
                      meeting_topic: "PKPA Angkatan 41 Tahun 2025 - Kamis 21 Agustus 2025"
                      meeting_id: "86393318422"
                      meeting_uuid: "Rxypw0QQQJaerff0i4HHmg=="
                      summary_created_time: "2025-08-21 17:14:41"
                      created_at: "2025-08-21 22:06:14"
                      updated_at: "2025-08-21 22:06:14"
                    - id: 143
                      meeting_topic: "Rapat Kegiatan BNPB"
                      meeting_id: "85432104253"
                      meeting_uuid: "odHoRmdwTDenUkYh+lbXuA=="
                      summary_created_time: "2025-08-21 14:51:35"
                      created_at: "2025-08-21 15:28:12"
                      updated_at: "2025-08-21 15:28:12"
                    - id: 142
                      meeting_topic: "Technical Meeting PKPA Angkatan 41 Tahun 2025 - Rabu 20 Agustus 2025"
                      meeting_id: "89888373925"
                      meeting_uuid: "137S+aExTaSay1ZoiJWq6w=="
                      summary_created_time: "2025-08-20 17:24:24"
                      created_at: "2025-08-20 20:47:11"
                      updated_at: "2025-08-20 20:47:11"
                    - id: 141
                      meeting_topic: "Pembahasan Draft Peraturan Bupati Bekasi Tentang BGS"
                      meeting_id: "81635315364"
                      meeting_uuid: "Eb11ONZGRRmo+oXMxpfZpQ=="
                      summary_created_time: "2025-08-20 13:15:55"
                      created_at: "2025-08-20 13:29:05"
                      updated_at: "2025-08-20 13:29:05"
                    - id: 140
                      meeting_topic: "Seminar Nasional dan Temu Alumni"
                      meeting_id: "89079273135"
                      meeting_uuid: "8kAsQQ6MT1e5p0rBBNzlLg=="
                      summary_created_time: "2025-08-20 08:14:43"
                      created_at: "2025-08-20 13:01:40"
                      updated_at: "2025-08-20 13:01:40"
                  meta:
                    current_page: 1
                    per_page: 15
                    total: 5
                    last_page: 1
        '401':
          description: Unauthorized (token tidak valid)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SummariesListResponse:
      type: object
      properties:
        response:
          $ref: "#/components/schemas/StdResponse200"
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SummaryListItem"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    SummaryListItem:
      type: object
      properties:
        id: { type: integer }
        meeting_topic: { type: string }
        meeting_id: { type: string }
        meeting_uuid:
          type: string
          description: "ID unik untuk **sesi rapat** (session/occurrence) yang dihasilkan oleh Zoom."
        summary_created_time: { type: string, description: "YYYY-MM-DD HH:mm:ss" }
        created_at: { type: string, description: "YYYY-MM-DD HH:mm:ss" }
        updated_at: { type: string, description: "YYYY-MM-DD HH:mm:ss" }

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }

    StdResponse200:
      type: object
      properties:
        status: { type: string, example: success }
        status_code: { type: integer, example: 200 }
        message: { type: string, example: Summary retrieved successfully }
