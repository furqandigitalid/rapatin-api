openapi: 3.0.0
info:
  title: Show Order Balance Detail
  version: 1.0.1
  description: Endpoint untuk mengambil detail order balance berdasarkan nomor order.

servers:
  - url: https://api.rapatin.id

paths:
  /balances/order/{order_number}:
    get:
      tags: [Balances]
      summary: Show Order Balance Detail
      description: Ambil detail order balance berdasarkan nomor order.
      parameters:
        - in: path
          name: order_number
          required: true
          schema:
            type: string
            example: OR3260
          description: Nomor order balance.
        - in: header
          name: Accept
          required: true
          schema:
            type: string
            example: application/json
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer {token}"
      responses:
        '200':
          description: Order balance retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBalanceDetailSuccessResponse"
              example:
                response:
                  status: success
                  status_code: 200
                  message: Order balance retrieved successfully
                data:
                  order_number: "OR3260"
                  customer_name: "FDN"
                  email: "dulugeser@gmail.com"
                  phone: "088221759697"
                  item_name: "Balance"
                  amount: 200000
                  payment_method: "virtual_account"
                  payment_method_label: "VA"
                  status: "expired"
                  order_date: "2026-03-07 10:30:00"
                  expired_at: "2026-03-07 12:30:00"
                  paid_at: null
                  cancelled_at: null
                  payment_url: null
                  created_at: "2026-03-07 10:30:00"
                  updated_at: "2026-03-07 12:30:01"
        '401':
          description: Unauthorized (token tidak valid)
        '404':
          description: Order not found

components:
  schemas:
    OrderBalanceDetailSuccessResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            status:
              type: string
              example: success
            status_code:
              type: integer
              example: 200
            message:
              type: string
              example: Order balance retrieved successfully
        data:
          type: object
          properties:
            order_number:
              type: string
              description: Nomor order balance.
              example: OR3260
            customer_name:
              type: string
              description: Nama customer.
              example: FDN
            email:
              type: string
              description: Email customer.
              example: dulugeser@gmail.com
            phone:
              type: string
              description: Nomor telepon customer.
              example: "088221759697"
            item_name:
              type: string
              description: Nama item order.
              example: Balance
            amount:
              type: integer
              description: Nominal balance yang dibeli.
              example: 200000
            payment_method:
              type: string
              description: Kode metode pembayaran.
              example: virtual_account
            payment_method_label:
              type: string
              description: Label metode pembayaran yang ditampilkan ke user.
              example: VA
            status:
              type: string
              enum: [pending, paid, cancelled, expired]
              description: Status order balance.
              example: expired
            order_date:
              type: string
              description: "Tanggal order dalam format YYYY-MM-DD HH:mm:ss"
              example: "2026-03-07 10:30:00"
            expired_at:
              type: string
              nullable: true
              description: "Tanggal expired pembayaran dalam format YYYY-MM-DD HH:mm:ss"
              example: "2026-03-07 12:30:00"
            paid_at:
              type: string
              nullable: true
              description: "Tanggal pembayaran berhasil dalam format YYYY-MM-DD HH:mm:ss"
              example: null
            cancelled_at:
              type: string
              nullable: true
              description: "Tanggal order dibatalkan dalam format YYYY-MM-DD HH:mm:ss"
              example: null
            payment_url:
              type: string
              nullable: true
              description: URL pembayaran jika order masih dapat dibayar.
              example: null
            created_at:
              type: string
              description: "Tanggal record dibuat dalam format YYYY-MM-DD HH:mm:ss"
              example: "2026-03-07 10:30:00"
            updated_at:
              type: string
              description: "Tanggal record terakhir diperbarui dalam format YYYY-MM-DD HH:mm:ss"
              example: "2026-03-07 12:30:01"
