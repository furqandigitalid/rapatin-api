openapi: 3.0.0
info:
  title: Show Order Balance Detail
  version: 1.0.0
  description: Endpoint untuk mengambil detail order balance berdasarkan nomor order.

servers:
  - url: https://api.rapatin.id

paths:
  /balances/order/{order_number}:
    get:
      tags: [Balances]
      summary: Show Order Balance Detail
      description: Ambil detail order balance berdasarkan nomor order.
      parameters:
        - in: path
          name: order_number
          required: true
          schema:
            type: string
            example: OR-3349
          description: Nomor order balance.
        - in: header
          name: Accept
          required: true
          schema:
            type: string
            example: application/json
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer {token}"
      responses:
        '200':
          description: Order balance retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBalanceDetailSuccessResponse"
              example:
                response:
                  status: success
                  status_code: 200
                  message: Order balance retrieved successfully
                data:
                  order_number: "OR-3349"
                  balance: 200000
                  payment_method: "virtual_account"
                  promo_code: "PROMOHEMAT"
                  discount_amount: 10000
                  payment_fee: 4440
                  total_amount: 194440
                  status: "pending"
                  payment_url: "https://checkout.xendit.co/web/67a1bcde1234567890"
                  expired_at: "2025-10-12 15:00:00"
                  paid_at: null
                  cancelled_at: null
                  created_at: "2025-10-12 14:00:00"
                  updated_at: "2025-10-12 14:00:00"
        '401':
          description: Unauthorized (token tidak valid)
        '404':
          description: Order not found

components:
  schemas:
    OrderBalanceDetailSuccessResponse:
      type: object
      properties:
        response:
          type: object
          properties:
            status:
              type: string
              example: success
            status_code:
              type: integer
              example: 200
            message:
              type: string
              example: Order balance retrieved successfully
        data:
          type: object
          properties:
            order_number:
              type: string
              description: Nomor order balance.
              example: OR-3349
            balance:
              type: integer
              description: Nominal balance yang dibeli.
              example: 200000
            payment_method:
              type: string
              description: Metode pembayaran yang dipilih.
              example: virtual_account
            promo_code:
              type: string
              nullable: true
              description: Promo code yang digunakan, jika ada.
              example: PROMOHEMAT
            discount_amount:
              type: integer
              description: Nominal potongan promo.
              example: 10000
            payment_fee:
              type: integer
              description: Biaya pembayaran.
              example: 4440
            total_amount:
              type: integer
              description: Total akhir yang harus dibayar.
              example: 194440
            status:
              type: string
              description: Status order balance.
              enum: [pending, paid, cancelled, expired]
              example: pending
            payment_url:
              type: string
              nullable: true
              description: URL halaman pembayaran Xendit.
              example: https://checkout.xendit.co/web/67a1bcde1234567890
            expired_at:
              type: string
              nullable: true
              description: "YYYY-MM-DD HH:mm:ss"
              example: "2025-10-12 15:00:00"
            paid_at:
              type: string
              nullable: true
              description: "YYYY-MM-DD HH:mm:ss"
              example: null
            cancelled_at:
              type: string
              nullable: true
              description: "YYYY-MM-DD HH:mm:ss"
              example: null
            created_at:
              type: string
              description: "YYYY-MM-DD HH:mm:ss"
              example: "2025-10-12 14:00:00"
            updated_at:
              type: string
              description: "YYYY-MM-DD HH:mm:ss"
              example: "2025-10-12 14:00:00"
